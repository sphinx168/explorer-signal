<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>探索者1號：訊號接收</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%2305070d'/%3E%3Cpath d='M32 8 52 48 32 40 12 48Z' fill='%236dffb5'/%3E%3Ccircle cx='32' cy='30' r='5' fill='%2305070d'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="任務狀態">
        <div>
          <p class="eyebrow">Explorer Signal</p>
          <h1>探索者1號：訊號接收</h1>
        </div>
        <div class="stats" aria-live="polite">
          <div>
            <span>分數</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span>時間</span>
            <strong id="time">60</strong>
          </div>
        </div>
      </section>

      <section class="game-frame" aria-label="遊戲區域">
        <canvas id="game" width="900" height="560" aria-label="控制探索者接住落下訊號的遊戲"></canvas>
        <div class="overlay" id="overlay">
          <p class="status" id="status">待命中</p>
          <p class="message" id="message">第一個 GitHub 任務準備發射。</p>
          <button id="startButton" type="button">開始接收</button>
        </div>
      </section>

      <section class="controls" aria-label="操作說明">
        <span>方向鍵 / A D 移動</span>
        <span>滑鼠或手指拖曳也可以控制</span>
        <span>60 秒內接住越多訊號越好</span>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
